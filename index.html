<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa con CSV</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <div id="mapa" style="width: 100%; height: 600px;"></div>

  <script>
    Plotly.d3.csv("datos.csv", function(err, rows) {
      if (err) {
        console.error(err);
        return;
      }

      const locations = rows.map(r => r.codigo_iso);
      const z = rows.map(r => Number(r.valor));
      const text = rows.map(r => r.pais);

      const data = [{
        type: "choropleth",
        locations: locations,
        z: z,
        text: text,
        colorscale: "Blues",
        colorbar: { title: "Valor" }
      }];

      const layout = {
        title: "Mapa desde CSV",
        geo: {
          projection: { type: "natural earth" }
        }
      };

      Plotly.newPlot("mapa", data, layout);
    });
  </script>
</body>
</html>
